<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WINE TYPE TEST</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --cream-dark: #EAE3D5;
  --cream-border: #D8CFBE;
  --red-main: #6B1F3A;
  --red-light: #8B2E4F;
  --red-dark: #4A1228;
  --red-accent: #C17A8A;
  --green-main: #2C4E35;
  --green-light: #3D6B49;
  --green-dark: #1A3321;
  --green-accent: #7AAB85;
  --text-dark: #1C1008;
  --text-mid: #4A3828;
  --text-light: #8A7060;
  --gold: #B8954A;
  --gold-light: #E8D8A8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
  font-size: 16px;
}

/* HEADER */
.header {
  background: var(--cream-dark);
  border-bottom: 2px solid var(--cream-border);
  padding: 52px 24px 44px;
  text-align: center;
}
.header-eyebrow {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 8vw, 64px);
  color: var(--text-dark);
  letter-spacing: 3px;
  margin-bottom: 12px;
  font-weight: 700;
}
.header-sub {
  font-size: 15px;
  color: var(--text-light);
  font-weight: 300;
  letter-spacing: 0.5px;
}

/* TABS */
.tab-wrapper {
  display: flex;
  max-width: 680px;
  margin: 36px auto 0;
  padding: 0 24px;
  gap: 0;
}
.tab-btn {
  flex: 1;
  padding: 16px 20px;
  border: 2px solid var(--cream-border);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  transition: all 0.3s;
  background: white;
  color: var(--text-light);
}
.tab-btn.red-tab { border-radius: 10px 0 0 10px; border-right: 1px solid var(--cream-border); }
.tab-btn.white-tab { border-radius: 0 10px 10px 0; border-left: 1px solid var(--cream-border); }
.tab-btn.red-tab.active { background: var(--red-main); color: var(--cream); border-color: var(--red-main); }
.tab-btn.white-tab.active { background: var(--green-main); color: var(--cream); border-color: var(--green-main); }

/* MAIN */
.main {
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* INTRO */
.intro-card {
  background: white;
  border-radius: 14px;
  padding: 28px 32px;
  margin-bottom: 28px;
  border: 1.5px solid var(--cream-border);
  border-left: 5px solid var(--gold);
}
.intro-card p {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text-mid);
  font-weight: 400;
}

/* PROGRESS */
.progress-wrap { margin-bottom: 28px; }
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.progress-label { font-size: 13px; color: var(--text-light); letter-spacing: 2px; font-weight: 500; }
.progress-count { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text-dark); }
.progress-bar { height: 4px; background: var(--cream-dark); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; background: var(--red-main); }
.progress-fill.green { background: var(--green-main); }

/* CATEGORY */
.category-label {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
  background: var(--gold-light);
  color: var(--text-mid);
}

/* QUESTION CARD */
.question-card {
  background: white;
  border-radius: 14px;
  padding: 32px;
  margin-bottom: 16px;
  border: 1.5px solid var(--cream-border);
}
.question-text {
  font-size: 19px;
  font-weight: 600;
  color: var(--text-dark);
  line-height: 1.6;
  margin-bottom: 24px;
}

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 12px; }
.option-btn {
  width: 100%;
  padding: 16px 20px;
  border: 1.5px solid var(--cream-border);
  border-radius: 10px;
  background: var(--cream);
  cursor: pointer;
  text-align: left;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--text-mid);
  line-height: 1.5;
  transition: all 0.2s;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.option-btn:hover { border-color: var(--gold); background: white; transform: translateX(3px); }
.option-btn.sel-red { background: var(--red-main); color: white; border-color: var(--red-main); }
.option-btn.sel-green { background: var(--green-main); color: white; border-color: var(--green-main); }
.option-letter {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
  opacity: 0.6;
  margin-top: 1px;
}
.option-btn.sel-red .option-letter,
.option-btn.sel-green .option-letter { opacity: 1; }

/* NAV */
.nav-buttons { display: flex; gap: 12px; margin-top: 8px; }
.btn-prev {
  flex: 1;
  padding: 16px;
  border: 1.5px solid var(--cream-border);
  border-radius: 10px;
  background: white;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  color: var(--text-light);
  transition: all 0.2s;
}
.btn-prev:hover { border-color: var(--text-light); color: var(--text-dark); }
.btn-next {
  flex: 2;
  padding: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: white;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
.btn-next.red-btn { background: var(--red-main); }
.btn-next.green-btn { background: var(--green-main); }
.btn-next:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* RESULT */
.result-card { display: none; border-radius: 16px; overflow: hidden; border: 1.5px solid var(--cream-border); }
.result-card.show { display: block; }
.result-header {
  padding: 48px 36px 40px;
  text-align: center;
}
.result-header.red-bg { background: linear-gradient(135deg, var(--red-dark), var(--red-main)); }
.result-header.green-bg { background: linear-gradient(135deg, var(--green-dark), var(--green-main)); }
.result-emoji { font-size: 60px; margin-bottom: 20px; display: block; }
.result-eyebrow { font-size: 12px; letter-spacing: 3px; color: var(--gold-light); text-transform: uppercase; margin-bottom: 10px; font-weight: 500; }
.result-wine-name { font-family: 'Playfair Display', serif; font-size: 38px; color: white; margin-bottom: 10px; font-style: italic; }
.result-origin { font-size: 14px; color: rgba(255,255,255,0.65); font-weight: 300; letter-spacing: 1px; }

.result-body { padding: 36px; background: white; }
.result-section { margin-bottom: 28px; }
.result-section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--cream-border);
}
.result-desc {
  font-size: 15px;
  line-height: 2;
  color: var(--text-mid);
  font-weight: 400;
}
.result-traits { display: flex; flex-wrap: wrap; gap: 8px; }
.trait-tag {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  background: var(--cream);
  color: var(--text-mid);
  border: 1px solid var(--cream-border);
}
.result-pairing {
  background: var(--cream);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 28px;
}
.pairing-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 16px;
}
.pairing-item {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  font-size: 15px;
  color: var(--text-mid);
}
.pairing-icon { font-size: 20px; flex-shrink: 0; }
.btn-retry {
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 12px;
  background: var(--text-dark);
  color: white;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-retry:hover { opacity: 0.85; }

/* MOBILE OPTIMIZATIONS */
@media (max-width: 480px) {
  .header { padding: 40px 20px 36px; }
  .header h1 { font-size: 36px; letter-spacing: 2px; }
  .tab-wrapper { padding: 24px 16px 0; }
  .tab-btn { font-size: 14px; padding: 14px 12px; }
  .main { padding: 24px 16px 60px; }
  .intro-card { padding: 22px 20px; }
  .question-card { padding: 24px 20px; }
  .question-text { font-size: 17px; }
  .option-btn { font-size: 14px; padding: 14px 16px; }
  .result-header { padding: 40px 24px 32px; }
  .result-wine-name { font-size: 30px; }
  .result-body { padding: 28px 20px; }
  .result-desc { font-size: 14px; }
  .nav-buttons { gap: 8px; }
  .btn-next, .btn-prev { font-size: 14px; padding: 14px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Château Chaekbahang</div>
  <h1>WINE TYPE TEST</h1>
  <p class="header-sub">15가지 질문으로 찾는 나의 와인 타입</p>
</div>

<div class="tab-wrapper">
  <button class="tab-btn red-tab active" onclick="switchMode('red')">🍷 레드 와인</button>
  <button class="tab-btn white-tab" onclick="switchMode('white')">🥂 화이트 와인</button>
</div>

<div class="main">
  <div class="intro-card">
    <p>와인에도 <strong>성격</strong>이 있어요. 가볍고 섬세한 와인이 있는가 하면, 묵직하고 강렬한 와인도 있죠. 15가지 질문에 솔직하게 답하면, 당신의 취향과 가장 닮은 와인을 찾아드릴게요.</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span class="progress-label">QUESTION</span>
      <span class="progress-count" id="progressCount">1 / 15</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:6.67%"></div>
    </div>
  </div>

  <div id="questionArea">
    <div class="question-card">
      <div class="category-label" id="categoryLabel"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsArea"></div>
    </div>
    <div class="nav-buttons">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()" style="display:none">← 이전</button>
      <button class="btn-next red-btn" id="btnNext" onclick="nextQ()" disabled>다음 →</button>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header" id="resultHeader">
      <span class="result-emoji" id="resultEmoji"></span>
      <div class="result-eyebrow">당신의 와인 타입은</div>
      <div class="result-wine-name" id="resultWineName"></div>
      
    </div>
    <div class="result-body">
      <div class="result-section">
        <div class="result-section-title">ABOUT THIS WINE</div>
        <div class="result-desc" id="resultDesc"></div>
      </div>
      <div class="result-section">
        <div class="result-section-title">CHARACTERISTICS</div>
        <div class="result-traits" id="resultTraits"></div>
      </div>
      <div class="result-pairing" id="resultPairing"></div>
      <button class="btn-retry" onclick="retry()">🔄 다시 테스트하기</button>
    </div>
  </div>
</div>

<script>
let mode = 'red', curQ = 0, answers = new Array(15).fill(null);

const cats = ['평소 술 취향','평소 술 취향','와인 취향','와인 취향','와인 취향','와인 취향','입맛','입맛','입맛','와인 안주','와인 안주','식사 스타일','일상','일상','일상'];

// ── 레드 질문 ──
const redQs = [
  { text:"평소 즐겨 마시는 술은?", opts:["🍺 맥주 — 시원하고 청량하게","🥃 소주 — 깔끔하고 드라이하게","🍶 막걸리 — 구수하고 달달하게","🥃 양주 / 위스키 — 묵직하고 깊게"],
    map:[['피노누아',2,'메를로',1],['카베르네소비뇽',2,'템프라니요',1],['메를로',2,'말벡',1],['쉬라즈',2,'카베르네소비뇽',1]] },
  { text:"맥주를 마신다면 어떤 스타일?", opts:["🌊 가볍고 청량한 라거","🌑 진하고 쌉쌀한 흑맥주","🌿 향긋한 크래프트 맥주","🍑 달달한 과일맥주"],
    map:[['피노누아',2,'템프라니요',1],['쉬라즈',2,'카베르네소비뇽',1],['템프라니요',2,'말벡',1],['메를로',2,'피노누아',1]] },
  { text:"와인을 마셔봤다면, 기억에 남는 맛은?", opts:["🍋 상큼하고 과일향 나는 와인","🍯 달달하고 부드러운 와인","🍫 진하고 묵직한 와인","🧊 드라이하고 깔끔한 와인"],
    map:[['피노누아',2,'템프라니요',1],['메를로',2,'말벡',1],['카베르네소비뇽',2,'쉬라즈',1],['템프라니요',2,'카베르네소비뇽',1]] },
  { text:"와인 향 중 가장 끌리는 건?", opts:["🍓 딸기, 체리 같은 레드베리향","🫐 블랙베리, 자두 같은 다크베리향","🍑 복숭아, 자몽 같은 과일향","🌸 꽃향기, 허브향"],
    map:[['피노누아',2,'메를로',1],['카베르네소비뇽',2,'말벡',1],['메를로',2,'피노누아',1],['템프라니요',2,'피노누아',1]] },
  { text:"와인의 탄닌(떫은맛)은 어느 정도가 좋아?", opts:["😌 떫은 맛 싫어, 부드러운 게 좋아","😊 약간 있는 게 좋아","😤 강할수록 좋아, 그게 와인이지","🤔 잘 모르겠어"],
    map:[['피노누아',2,'메를로',1],['메를로',2,'템프라니요',1],['카베르네소비뇽',2,'쉬라즈',1],['메를로',2,'피노누아',1]] },
  { text:"음식이나 음료에서 가장 싫은 맛은?", opts:["😖 너무 떫고 쓴 맛","🙅 너무 달달한 맛","😬 너무 신 맛","👃 특이한 향이 강한 것"],
    map:[['피노누아',2,'메를로',1],['카베르네소비뇽',2,'템프라니요',1],['말벡',2,'메를로',1],['메를로',2,'카베르네소비뇽',1]] },
  { text:"음식 취향은?", opts:["🥗 담백하고 깔끔한 게 좋아","🍮 달달하고 부드러운 게 좋아","🌶 자극적이고 강한 맛이 좋아","🫙 향신료 가득한 이국적인 맛이 좋아"],
    map:[['피노누아',2,'템프라니요',1],['메를로',2,'말벡',1],['쉬라즈',2,'카베르네소비뇽',1],['템프라니요',2,'쉬라즈',1]] },
  { text:"커피는 어떻게 마셔?", opts:["☕ 아이스 아메리카노 (블랙)","🍬 달달한 라떼나 카라멜 마키아토","⚡ 에스프레소 (진하게)","🌿 허브티나 과일차"],
    map:[['카베르네소비뇽',2,'피노누아',1],['메를로',2,'말벡',1],['쉬라즈',2,'카베르네소비뇽',1],['피노누아',2,'템프라니요',1]] },
  { text:"디저트를 고른다면?", opts:["🚫 안 먹어, 단 거 별로야","🎂 달달한 케이크, 마카롱","🍫 다크초콜릿, 티라미수","🍓 과일, 요거트 같은 상큼한 거"],
    map:[['카베르네소비뇽',2,'템프라니요',1],['말벡',2,'메를로',1],['쉬라즈',2,'카베르네소비뇽',1],['피노누아',2,'메를로',1]] },
  { text:"와인 안주로 가장 끌리는 건?", opts:["🧀 치즈 플레이트","🥩 스테이크나 고기류","🦪 해산물, 굴","🍇 과일이나 가벼운 샐러드"],
    map:[['피노누아',2,'메를로',1],['카베르네소비뇽',2,'쉬라즈',1],['피노누아',2,'템프라니요',1],['메를로',2,'피노누아',1]] },
  { text:"고기를 먹는다면?", opts:["🍗 닭가슴살, 생선 같은 담백한 것","🥓 삼겹살, 목살 같은 부드러운 것","🍖 양고기, 오리 같은 진한 것","🥩 육즙 가득한 소고기 스테이크"],
    map:[['피노누아',2,'메를로',1],['메를로',2,'말벡',1],['쉬라즈',2,'템프라니요',1],['카베르네소비뇽',2,'말벡',1]] },
  { text:"식사 스타일은?", opts:["🍱 간단하고 가볍게","🕯 코스요리처럼 천천히 즐기며","🍖 푸짐하고 든든하게","🌏 이국적이고 새로운 음식 도전"],

function getQs() { return mode === 'red' ? redQs : whiteQs; }

function switchMode(m) {
  mode = m; curQ = 0; answers = new Array(15).fill(null);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.${m}-tab`).classList.add('active');
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('questionArea').style.display = 'block';
  const fill = document.getElementById('progressFill');
  fill.className = 'progress-fill' + (m === 'white' ? ' green' : '');
  renderQ();
}

function renderQ() {
  const q = getQs()[curQ];
  document.getElementById('categoryLabel').textContent = cats[curQ];
  document.getElementById('questionText').textContent = q.text;
  const letters = ['A','B','C','D'];
  const selClass = mode === 'red' ? 'sel-red' : 'sel-green';
  document.getElementById('optionsArea').innerHTML = q.opts.map((o,i) =>
    `<button class="option-btn ${answers[curQ]===i ? selClass : ''}" onclick="pick(${i})">
      <span class="option-letter">${letters[i]}</span><span>${o}</span>
    </button>`
  ).join('');
  document.getElementById('progressCount').textContent = `${curQ+1} / 15`;
  document.getElementById('progressFill').style.width = `${((curQ+1)/15)*100}%`;
  const btnNext = document.getElementById('btnNext');
  btnNext.disabled = answers[curQ] === null;
  btnNext.textContent = curQ === 14 ? '결과 보기 →' : '다음 →';
  btnNext.className = `btn-next ${mode === 'red' ? 'red-btn' : 'green-btn'}`;
  document.getElementById('btnPrev').style.display = curQ === 0 ? 'none' : 'block';
}

function pick(i) { answers[curQ] = i; renderQ(); }

function nextQ() {
  if (answers[curQ] === null) return;
  if (curQ === 14) { showResult(); return; }
  curQ++; renderQ();
}

function prevQ() { if (curQ > 0) { curQ--; renderQ(); } }

function calcScores() {
  const s = {};
  getQs().forEach((q, qi) => {
    const a = answers[qi]; if (a === null) return;
    const m2 = q.map[a];
    for (let i = 0; i < m2.length; i+=2) s[m2[i]] = (s[m2[i]]||0) + m2[i+1];
  });
  return s;
}

function showResult() {
  const scores = calcScores();
  const winner = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const d = results[mode][winner];
  document.getElementById('questionArea').style.display = 'none';
  const card = document.getElementById('resultCard');
  card.classList.add('show');
  document.getElementById('resultEmoji').textContent = d.emoji;
  document.getElementById('resultHeader').className = `result-header ${mode==='red'?'red-bg':'green-bg'}`;
  document.getElementById('resultWineName').textContent = d.name;
  
  document.getElementById('resultDesc').textContent = d.desc;
  document.getElementById('resultTraits').innerHTML = d.traits.map(t=>`<span class="trait-tag">${t}</span>`).join('');
  document.getElementById('resultPairing').innerHTML = `
    <div class="pairing-title">PAIRING GUIDE</div>
    ${d.pairings.map(p=>`<div class="pairing-item"><span class="pairing-icon">${p[0]}</span><span>${p[1]}</span></div>`).join('')}
  `;
  card.scrollIntoView({behavior:'smooth'});
}

function retry() {
  curQ = 0; answers = new Array(15).fill(null);
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('questionArea').style.display = 'block';
  renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}

renderQ();
</script>
